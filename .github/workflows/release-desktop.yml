name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Leave empty to use YYYY.MM.DD-dev-<short sha>."
        required: false
        type: string
      tag:
        description: "Git tag to create. Leave empty to use v<version>."
        required: false
        type: string
      minimum_desktop_version:
        description: "Minimum compatible desktop version recorded in the firmware manifest."
        required: true
        default: "dev"
        type: string
      supersedes:
        description: "Optional previous release tag to mention in release notes."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release."
        required: true
        default: true
        type: boolean
      draft:
        description: "Create the GitHub release as a draft. Draft assets are not usable as anonymous Sparkle feeds."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: release
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short HEAD)"
          version="${{ inputs.version }}"
          if [[ -z "$version" ]]; then
            version="$(date '+%Y.%m.%d')-dev-$short_sha"
          fi
          tag="${{ inputs.tag }}"
          if [[ -z "$tag" ]]; then
            tag="v$version"
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "tag=$tag" >>"$GITHUB_OUTPUT"

  build:
    name: Build, notarize, and verify (${{ matrix.arch }})
    needs: metadata
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            appcast: appcast.xml
          - arch: x86_64
            runner: macos-15-intel
            appcast: appcast-x86_64.xml

    env:
      SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
      NOTARYTOOL_TIMEOUT: 30m
      ESP_IDF_VERSION: v5.5
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release secrets
        run: |
          set -euo pipefail
          missing=0
          for name in \
            SIGNING_IDENTITY \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            APPLE_API_KEY \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER \
            SPARKLE_PUBLIC_ED_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Confirm runner architecture
        run: |
          set -euo pipefail
          actual_arch="$(uname -m)"
          if [[ "$actual_arch" != "${{ matrix.arch }}" ]]; then
            echo "::error::Expected ${{ matrix.arch }} runner but got $actual_arch"
            exit 1
          fi
          echo "Using $actual_arch runner for ${{ matrix.arch }} release."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install CJK font build dependency
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip Pillow
          echo "VIBE_CJK_FONT_PYTHON=$(command -v python3)" >>"$GITHUB_ENV"

      - name: Prepare bundled Python runtime
        id: python-runtime
        run: |
          set -euo pipefail
          pyver="$(python3 - <<'PY'
          import sys
          print(f"{sys.version_info.major}.{sys.version_info.minor}")
          PY
          )"
          python_prefix="$(python3 - <<'PY'
          import pathlib
          import sys
          print(pathlib.Path(sys.prefix).resolve())
          PY
          )"
          runtime_dir="$RUNNER_TEMP/python-runtime"
          rm -rf "$runtime_dir"
          mkdir -p "$runtime_dir/bin" "$runtime_dir/lib"
          python3 - <<'PY' "$runtime_dir" "$pyver"
          import os
          import pathlib
          import shutil
          import stat
          import sys
          import sysconfig

          runtime_dir = pathlib.Path(sys.argv[1])
          pyver = sys.argv[2]
          prefix = pathlib.Path(sys.prefix).resolve()
          app_executable = prefix / "Resources" / "Python.app" / "Contents" / "MacOS" / "Python"
          source_executable = app_executable if app_executable.is_file() else pathlib.Path(sys.executable).resolve()
          stdlib = pathlib.Path(sysconfig.get_path("stdlib")).resolve()
          platstdlib = pathlib.Path(sysconfig.get_path("platstdlib")).resolve()
          libdir_value = sysconfig.get_config_var("LIBDIR")

          bin_dir = runtime_dir / "bin"
          lib_dir = runtime_dir / "lib"
          runtime_stdlib = lib_dir / f"python{pyver}"

          shutil.copy2(source_executable, bin_dir / f"python{pyver}")
          executable_mode = (bin_dir / f"python{pyver}").stat().st_mode
          (bin_dir / f"python{pyver}").chmod(executable_mode | stat.S_IXUSR | stat.S_IXGRP | stat.S_IXOTH)
          os.symlink(f"python{pyver}", bin_dir / "python3")

          shutil.copytree(stdlib, runtime_stdlib, symlinks=True)
          source_dynload = platstdlib / "lib-dynload"
          target_dynload = runtime_stdlib / "lib-dynload"
          if source_dynload.is_dir() and source_dynload.resolve() != target_dynload.resolve():
              if target_dynload.exists():
                  shutil.rmtree(target_dynload)
              shutil.copytree(source_dynload, target_dynload, symlinks=True)

          dylib_patterns = [f"libpython{pyver}*.dylib", f"libpython{pyver}*.so"]
          lib_search_dirs = []
          if libdir_value:
              lib_search_dirs.append(pathlib.Path(libdir_value).resolve())
          lib_search_dirs.extend([prefix / "lib", prefix])
          seen = set()
          for lib_search_dir in lib_search_dirs:
              if not lib_search_dir.is_dir():
                  continue
              for pattern in dylib_patterns:
                  for source_url in sorted(lib_search_dir.glob(pattern)):
                      resolved = source_url.resolve()
                      if resolved in seen or not resolved.is_file():
                          continue
                      seen.add(resolved)
                      shutil.copy2(resolved, lib_dir / source_url.name)
          framework_binary = prefix / "Python"
          if framework_binary.is_file() and not (lib_dir / f"libpython{pyver}.dylib").exists():
              shutil.copy2(framework_binary, lib_dir / f"libpython{pyver}.dylib")
          PY
          version="$(python3 - <<'PY'
          import platform
          print(platform.python_version())
          PY
          )"
          runtime_arch="$(uname -m)"
          cat >"$runtime_dir/package.json" <<JSON
          {
            "name": "python-runtime",
            "version": "$version-github-actions",
            "license": "PSF-2.0",
            "homepage": "https://github.com/actions/python-versions",
            "system": "darwin_$runtime_arch"
          }
          JSON
          license_file="$(find "$python_prefix" -maxdepth 4 -iname 'LICENSE*' -type f | head -n 1 || true)"
          if [[ -n "$license_file" ]]; then
            cp "$license_file" "$runtime_dir/LICENSE"
          else
            cat >"$runtime_dir/LICENSE" <<'EOF'
          Python Software Foundation License.
          See https://docs.python.org/3/license.html for the complete license text.
          EOF
          fi
          if [[ -f "$runtime_dir/lib/libpython$pyver.dylib" ]]; then
            install_name_tool -id "@rpath/libpython$pyver.dylib" "$runtime_dir/lib/libpython$pyver.dylib" || true
            for old_name in \
              "@executable_path/../Python" \
              "@executable_path/../../../Python" \
              "@executable_path/../../../../Python" \
              "@loader_path/../Python" \
              "@loader_path/../../../Python" \
              "@loader_path/../../../../Python" \
              "$(python3 - <<'PY'
          import pathlib
          import sys
          print(pathlib.Path(sys.prefix).resolve() / "Python")
          PY
          )"
            do
              install_name_tool -change "$old_name" "@rpath/libpython$pyver.dylib" "$runtime_dir/bin/python$pyver" || true
            done
            install_name_tool -add_rpath "@executable_path/../lib" "$runtime_dir/bin/python$pyver" || true
            codesign --force --sign - "$runtime_dir/lib/libpython$pyver.dylib"
            codesign --force --sign - "$runtime_dir/bin/python$pyver"
          fi
          otool -L "$runtime_dir/bin/python$pyver" || true
          script/verify_desktop_release_arch.sh --arch "${{ matrix.arch }}" "$runtime_dir"
          PYTHONHOME="$runtime_dir" "$runtime_dir/bin/python3" - <<'PY'
          import bz2
          import ctypes
          import encodings
          import json
          import lzma
          import pathlib
          import ssl
          import zlib
          print("bundled runtime import check passed")
          PY
          echo "path=$runtime_dir" >>"$GITHUB_OUTPUT"

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: ${{ env.ESP_IDF_VERSION }}

      - name: Import Developer ID certificate
        env:
          KEYCHAIN_PASSWORD: ${{ runner.temp }}/not-a-secret
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/vibe-light-build.keychain-db"
          certificate="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode >"$certificate"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$certificate" \
            -k "$keychain" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$keychain" login.keychain-db
          security default-keychain -d user -s "$keychain"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$keychain"
          security find-identity -p codesigning -v

      - name: Store notarization profile
        env:
          NOTARYTOOL_PROFILE: vibe-light-ci-${{ github.run_id }}-${{ matrix.arch }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s\n' "$APPLE_API_KEY" >"$key_path"
          chmod 600 "$key_path"
          xcrun notarytool store-credentials "$NOTARYTOOL_PROFILE" \
            --key "$key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --validate
          echo "NOTARYTOOL_PROFILE=$NOTARYTOOL_PROFILE" >>"$GITHUB_ENV"

      - name: Run notarized desktop release checklist
        env:
          VIBE_LIGHT_SPARKLE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/${{ matrix.appcast }}
        run: |
          set -euo pipefail
          script/desktop_firmware_release_checklist.sh \
            --arch "${{ matrix.arch }}" \
            --version "${{ needs.metadata.outputs.version }}" \
            --minimum-desktop-version "${{ inputs.minimum_desktop_version }}" \
            --python-runtime "${{ steps.python-runtime.outputs.path }}" \
            --require-bundled-python \
            --identity "$SIGNING_IDENTITY" \
            --notarize \
            --notarytool-profile "$NOTARYTOOL_PROFILE" \
            --notarytool-timeout "$NOTARYTOOL_TIMEOUT"

      - name: Verify release archive
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          arch="${{ matrix.arch }}"
          zip_path="dist/release/VibeLightApp-$version-$arch-notarized.zip"
          report_path="dist/release/desktop-firmware-release-$version-$arch.md"
          test_dir="$RUNNER_TEMP/vibe-light-release-check"
          rm -rf "$test_dir"
          mkdir -p "$test_dir"
          ditto -x -k "$zip_path" "$test_dir"
          app_path="$test_dir/VibeLightApp.app"
          VIBE_LIGHT_REQUIRE_SPARKLE_METADATA=1 script/verify_desktop_app_bundle.sh "$app_path"
          script/verify_desktop_release_arch.sh --arch "$arch" "$app_path"
          xcrun stapler validate "$app_path"
          syspolicy_check distribution "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          env PATH=/usr/bin:/bin:/usr/sbin:/sbin \
            VIBE_LIGHT_FIRMWARE_FLASHER_STRICT=1 \
            /bin/bash "$app_path/Contents/Resources/VibeLight_VibeLightApp.bundle/FirmwareTools/vibe-light-firmware-flasher" --help >/tmp/vibe-light-flasher-help.txt
          grep -q 'esptool.py' /tmp/vibe-light-flasher-help.txt
          test -f "$report_path"

      - name: Check release logs for credential arguments
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          arch="${{ matrix.arch }}"
          if grep -E -q 'apple-api|AuthKey_|APPLE_API_KEY|APPLE_API_ISSUER|SPARKLE_PRIVATE_KEY|sparkle-private-key' \
            "dist/release/logs/package-desktop-$version-$arch.log" \
            "dist/release/desktop-firmware-release-$version-$arch.md"
          then
            echo "::error::Release logs contain credential-like arguments."
            exit 1
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            dist/release/VibeLightApp-${{ needs.metadata.outputs.version }}-${{ matrix.arch }}-notarized.zip
            dist/release/desktop-firmware-release-${{ needs.metadata.outputs.version }}-${{ matrix.arch }}.md

  publish:
    name: Generate appcasts and publish release
    needs:
      - metadata
      - build
    runs-on: macos-15
    timeout-minutes: 30
    env:
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate publish secrets
        run: |
          set -euo pipefail
          if [[ -z "${SPARKLE_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret: SPARKLE_PRIVATE_KEY"
            exit 1
          fi

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Build Sparkle tools
        run: |
          set -euo pipefail
          swift build --package-path projects/macos/desktop

      - name: Write release notes
        id: notes
        run: |
          set -euo pipefail
          notes="$RUNNER_TEMP/release-notes.md"
          version="${{ needs.metadata.outputs.version }}"
          arm_zip="dist/release/VibeLightApp-$version-arm64-notarized.zip"
          intel_zip="dist/release/VibeLightApp-$version-x86_64-notarized.zip"
          arm_report="dist/release/desktop-firmware-release-$version-arm64.md"
          intel_report="dist/release/desktop-firmware-release-$version-x86_64.md"
          arm_zip_sha="$(shasum -a 256 "$arm_zip" | awk '{print $1}')"
          intel_zip_sha="$(shasum -a 256 "$intel_zip" | awk '{print $1}')"
          arm_report_sha="$(shasum -a 256 "$arm_report" | awk '{print $1}')"
          intel_report_sha="$(shasum -a 256 "$intel_report" | awk '{print $1}')"
          cat >"$notes" <<EOF
          Vibe Light $version release for the macOS firmware flashing flow.

          Vibe Light original source code is source-available for non-commercial use under the Vibe Light Non-Commercial Source License. Third-party components remain under their respective upstream licenses.
          EOF
          if [[ -n "${{ inputs.supersedes }}" ]]; then
            cat >>"$notes" <<EOF

          Supersedes ${{ inputs.supersedes }}.
          EOF
          fi
          cat >>"$notes" <<EOF

          Artifacts:
          - VibeLightApp-$version-arm64-notarized.zip
            - SHA-256: $arm_zip_sha
          - VibeLightApp-$version-x86_64-notarized.zip
            - SHA-256: $intel_zip_sha
          - desktop-firmware-release-$version-arm64.md
            - SHA-256: $arm_report_sha
          - desktop-firmware-release-$version-x86_64.md
            - SHA-256: $intel_report_sha

          Validation completed in GitHub Actions:
          - arm64 build ran on macos-15 and x86_64 build ran on macos-15-intel.
          - ESP-IDF firmware build completed with ESP-IDF v5.5 for both release artifacts.
          - Developer ID signing completed for app, helper, bundled Python runtime, and nested Mach-O files.
          - Bundle Mach-O architecture checks passed for arm64 and x86_64 artifacts.
          - Apple notarization accepted; staple validation passed for both artifacts.
          - syspolicy_check distribution and codesign --verify --deep --strict passed after ditto extraction.
          - Bundled helper ran in strict mode with a narrowed PATH and reported esptool.py for both artifacts.
          - Release logs were checked for Apple API key argument leakage.

          Local follow-up still required:
          - Download the matching release asset on an Apple Silicon Mac and an Intel Mac when available.
          - Use Finder / Archive Utility or ditto to extract the zip.
          - Run the firmware flashing UI against a real ESP32-S3 and verify BLE health reconnect.
          - For Sparkle stable updates, publish a normal release so the default latest/download appcast URLs resolve.
          - For Sparkle beta testing, build the old test app with a tag-specific VIBE_LIGHT_SPARKLE_FEED_URL.
          - Do not use a draft release as a Sparkle feed; draft assets are not anonymously downloadable.
          EOF
          echo "path=$notes" >>"$GITHUB_OUTPUT"

      - name: Generate Sparkle appcasts
        id: appcast
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          asset_prefix="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ needs.metadata.outputs.tag }}/"
          script/generate_desktop_appcast.sh \
            --version "$version" \
            --archive "dist/release/VibeLightApp-$version-arm64-notarized.zip" \
            --release-notes "${{ steps.notes.outputs.path }}" \
            --download-url-prefix "$asset_prefix" \
            --output dist/release/appcast.xml
          script/generate_desktop_appcast.sh \
            --version "$version" \
            --archive "dist/release/VibeLightApp-$version-x86_64-notarized.zip" \
            --release-notes "${{ steps.notes.outputs.path }}" \
            --download-url-prefix "$asset_prefix" \
            --output dist/release/appcast-x86_64.xml
          appcast_arm_sha="$(shasum -a 256 dist/release/appcast.xml | awk '{print $1}')"
          appcast_intel_sha="$(shasum -a 256 dist/release/appcast-x86_64.xml | awk '{print $1}')"
          echo "arm_path=dist/release/appcast.xml" >>"$GITHUB_OUTPUT"
          echo "intel_path=dist/release/appcast-x86_64.xml" >>"$GITHUB_OUTPUT"
          echo "arm_sha=$appcast_arm_sha" >>"$GITHUB_OUTPUT"
          echo "intel_sha=$appcast_intel_sha" >>"$GITHUB_OUTPUT"

      - name: Append appcast digest to release notes
        run: |
          set -euo pipefail
          cat >>"${{ steps.notes.outputs.path }}" <<EOF

          Sparkle appcasts:
          - appcast.xml
            - Architecture: arm64
            - SHA-256: ${{ steps.appcast.outputs.arm_sha }}
          - appcast-x86_64.xml
            - Architecture: x86_64
            - SHA-256: ${{ steps.appcast.outputs.intel_sha }}
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          args=(
            release create "${{ needs.metadata.outputs.tag }}"
            "dist/release/VibeLightApp-$version-arm64-notarized.zip"
            "dist/release/VibeLightApp-$version-x86_64-notarized.zip"
            "dist/release/desktop-firmware-release-$version-arm64.md"
            "dist/release/desktop-firmware-release-$version-x86_64.md"
            "${{ steps.appcast.outputs.arm_path }}"
            "${{ steps.appcast.outputs.intel_path }}"
            --title "${{ needs.metadata.outputs.tag }}"
            --notes-file "${{ steps.notes.outputs.path }}"
            --target "$GITHUB_SHA"
          )
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          if [[ "${{ inputs.draft }}" == "true" ]]; then
            args+=(--draft)
          fi
          gh "${args[@]}"
